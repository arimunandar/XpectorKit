name: XpectorDemo
options:
  bundleIdPrefix: com.xpector
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

# Staging is release-class (optimized, no DEBUG) but still runs the inspector,
# proving Xpector works in a non-DEBUG configuration.
configs:
  Debug: debug
  Staging: release
  Release: release

packages:
  XpectorKit:
    path: ..

targets:
  XpectorDemo:
    type: application
    platform: iOS
    sources:
      - XpectorDemo
    dependencies:
      - package: XpectorKit
        product: XpectorServer
      - package: XpectorKit
        product: XpectorKit
    info:
      path: XpectorDemo/Info.plist
      properties:
        NSLocalNetworkUsageDescription: "Xpector uses the local network to connect to the Mac debugging tool."
        NSBonjourServices:
          - "_xpector._tcp"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG XPECTOR_ENABLED
        Staging:
          # Compiles as Release (no DEBUG) but still runs Xpector — mirrors a
          # consumer's Staging/Canary config. XPECTOR_ENABLED is the single
          # source of truth for whether the inspector is active.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: XPECTOR_ENABLED
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
